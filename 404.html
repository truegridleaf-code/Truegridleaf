<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found | Truegridleaf</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body { font-family: 'Inter', sans-serif; background: #0f172a; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; margin: 0; padding: 20px; }
    .box { max-width: 500px; }
    h1 { font-family: 'Outfit', sans-serif; font-size: 6rem; margin: 0; background: linear-gradient(135deg, #4f46e5, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    h2 { font-family: 'Outfit', sans-serif; font-size: 1.8rem; margin: 10px 0 16px; }
    p { color: #94a3b8; line-height: 1.6; margin-bottom: 28px; }
    .btn { display: inline-flex; align-items: center; gap: 8px; font-family: 'Outfit', sans-serif; font-weight: 700; background: linear-gradient(135deg, #4f46e5, #6366f1); color: #fff; text-decoration: none; padding: 14px 28px; border-radius: 12px; transition: transform 0.2s; }
    .btn:hover { transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="box">
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>The page you are looking for might have been removed or had its name changed.</p>
    <a href="/" class="btn"><i class="fa-solid fa-house"></i> Return to Homepage</a>
  </div>
</body>
</html>
